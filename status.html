		<script language="JavaScript">

function arabicBytes(original)
{
	var rv;
	var int1 = original;
	var GB = " جيجابايت ", MB = " ميجابايت ", KB = " كيلوبايت ", B = " بايت ";
	if(int1 < 998) rv = int1 + B;
	else if(int1 < (998 * 998)) rv = Math.round(int1 / 998) + KB; 
	else if(int1 < (998 * 998 * 998)) rv = Math.round(int1 / (998 * 998)) + MB;
	else rv = Math.round(int1 / (998 * 998 * 998)) + GB;
	return rv;					 
}
</script>
<script language="JavaScript">

function readablizeBytes(bytes) {
var s = ['bytes', 'kb', 'MB', 'GB', 'TB', 'PB'];
var e = Math.floor(Math.log(bytes)/Math.log(998));
return (bytes/Math.pow(998, Math.floor(e))).toFixed(2)+" "+s[e];
}

</script>

//#########منطقة التعديل#########

var ID='Alnesr';
var RADIUS=60;
var VA=("$(remain-bytes-total)").replace(" GB","").replace(" MB","").replace(" KB","")/$(limit-bytes-total)*100;
var VALUE=VA;
var MAXVALUE=100;
var WIDTH=15;

var TEXT=function(VALUE){return VALUE + '%';};



if(VA<101){var COLORS=['#eee', '#0dff00'];};
if(VA<81){var COLORS=['#eee', '#C3EA04'];};
if(VA<51){var COLORS=['#eee', '#F38A04'];};
if(VA<21){var COLORS=['#eee', '#FB0D02'];};
var DURATION=500;

//########منطقة التعديل بيانات##########





Circles.create({
  id:           ID,
  radius:       RADIUS,
  value:        VALUE,
  maxValue:     MAXVALUE,
  width:        WIDTH,
  text:         TEXT,
  colors:       COLORS,
  duration:     DURATION,
  wrpClass:     'circles-wrp',
  textClass:    'circles-text',
  styleWrapper: true,
  styleText:    true
})
