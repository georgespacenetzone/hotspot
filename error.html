<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DELTA | خطأ</title>
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="ramadan.css">
</head>
<body>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                
                <div class="main-card animated bounceInDown" style="text-align: center;">
                    <div class="brand-header">
                        <img src="logo.png" alt="Delta Egypt" class="ramadan-logo">
                        <h3 class="brand-title">عذراً، حدث خطأ</h3>
                        <p class="brand-subtitle">حاول مرة أخرى</p>
                    </div>
                    
                    <div class="alert alert-danger" style="margin: 20px 0;">
                        <strong>تفاصيل الخطأ:</strong><br>
                        $(error)
                    </div>

                    <p>عيد فطر مبارك - حاول مرة أخرى</p>

                    <a href="$(link-login)" class="btn btn-primary btn-lg">العودة لصفحة الدخول</a>
                    
                    <div class="page-footer">
                        <div class="contact-pill">
                            <span class="label">الدعم الفني:</span>
                            <span dir="ltr" style="color: var(--gold-primary); font-weight: 700;">01222272449</span>
                        </div>
                        <div style="margin-top: 10px;">Delta Egypt For Network</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
